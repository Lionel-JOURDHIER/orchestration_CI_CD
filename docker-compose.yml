services:
  streamlit-app:
    build:
      context: ./app_front
      dockerfile: Dockerfile
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    env_file:
      - .env
    networks:
          - app_network
  api-app:
    build: ./app_api
    container_name: mon_api
    ports:
      - "${FASTAPI_PORT:-8000}:8080"
    # volumes:
    #   - ./app_api:/app
    environment:
      - FASTAPI_PORT=${FASTAPI_PORT}
    restart: always
    command: >
      sh -c "python -m uvicorn main:app --host 0.0.0.0 --port $$FASTAPI_PORT"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge