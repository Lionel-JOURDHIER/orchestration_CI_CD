services:
  streamlit-app:
    build:
      context: ./app_front
      dockerfile: Dockerfile
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    env_file:
      - .env
    networks:
      - front-api
  api-app:
    build: ./app_api
    container_name: mon_api
    ports:
      - "${FASTAPI_PORT}:${FASTAPI_PORT}"
    environment:
      - FASTAPI_PORT=${FASTAPI_PORT}
    env_file:
      - .env
    restart: always
    command: >
      sh -c "uv run uvicorn main:app --host 0.0.0.0 --port $$FASTAPI_PORT"
    networks:
      - front-api
      - api-db

  database:
    image: postgres:15-alpine
    container_name: postgres_container
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT : ${POSTGRES_PORT}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Persistance des données (le volume survit à l'arrêt du conteneur)
      - db_data:/var/lib/postgresql/data

    networks:
      - api-db

volumes:
  db_data:

networks:
  front-api:
    driver: bridge
  api-db: 
    driver: bridge