services:
  web-app:
    # --- AJOUTEZ CETTE SECTION ---
    build:
      context: ./app_front  # On pointe vers le sous-dossier
      dockerfile: Dockerfile # Le fichier dans app_front/Dockerfile
    # -----------------------------
    image: ${DOCKER_USER}/${DOCKER_CONTENEUR}:latest
    container_name: ${DOCKER_CONTENEUR}
    restart: always
    ports:
      - "${APP_PORT:-80}:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - ENV=production
    # Vérifiez que le chemin vers votre module est correct 
    # (si votre fichier est app_front/main.py, la commande pourrait varier)
    command: ["uv", "run", "python", "main.py"] 
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

