name: Python Ruff
on:
  push:
    branches: [ main, dev , 'feat/**']  # Branch to survey

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
        matrix:
            python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --all-extras
        
      - name: Inject Variables into README
        run: |
          # Ces variables sont récupérées directement du contexte GitHub
          USER=${{ github.repository_owner }}
          REPO=${{ github.event.repository.name }}
          VERSION=${{ steps.get_version.outputs.PROJECT_VERSION }}

          # Le script cherche les % et les remplace par les vraies valeurs
          sed -i "s/%VERSION%/$VERSION/g" README.md
          sed -i "s/%USER%/$USER/g" README.md
          sed -i "s/%REPO%/$REPO/g" README.md