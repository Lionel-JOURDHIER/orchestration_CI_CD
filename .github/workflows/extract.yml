name: Python Ruff
on:
  push:
    branches: [ main, dev , 'feat/**']  # Branch to survey

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
        matrix:
            python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      # --- EXTRACTION DE LA VERSION ---
      - name: Extract Project Version
        id: get_version
        run: |
          VERSION=$(grep -m 1 '^version = ' pyproject.toml | cut -d '"' -f 2)
          echo "PROJECT_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "### 🚀 Version du projet : v$VERSION" >> $GITHUB_STEP_SUMMARY

      # --- MISE À JOUR DU README (C'est ici qu'on utilise la variable) ---
      - name: Inject Variables into README
        run: |
          # On récupère les valeurs pour les utiliser dans sed
          # On utilise l'ID 'get_version' défini juste au-dessus
          VERSION="${{ steps.get_version.outputs.PROJECT_VERSION }}"
          USER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          EMAIL="lio.jourdhier@gmail.com"
          
          # On copie le template vers le vrai README avant de remplacer
          cp README.template.md README.md

          # On remplace les marqueurs dans le fichier README.md
          sed -i "s/%VERSION%/$VERSION/g" README.md
          sed -i "s/%USER%/$USER/g" README.md
          sed -i "s/%REPO%/$REPO/g" README.md

          # Mise à jour du Code de Conduite (si tu as mis des marqueurs dedans)
          sed -i "s/%EMAIL%/$EMAIL/g" CODE_OF_CONDUCT.md
          sed -i "s/%REPO%/$REPO/g" CODE_OF_CONDUCT.md

      - name: Commit and Push README
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git add .github/CODE_OF_CONDUCT.md
          
          git commit -m "docs: auto-update variables to v${{ steps.get_version.outputs.PROJECT_VERSION }} [skip ci]" || echo "No changes"
          git push