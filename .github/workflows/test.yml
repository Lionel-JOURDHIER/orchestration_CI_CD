name: Python Tests

on:
  push:
    branches: [ main, dev, 'feat/**' ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_app:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "app_*/uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # --- TESTS FRONT-END ---
      - name: Install dependencies app_front
        run: uv sync --project app_front --frozen --all-extras --all-groups

      - name: Run Tests app_front
        env:
          FASTAPI_PORT: 8000
        run: |
          # Exécution et capture
          uv run --project app_front pytest tests/ \
            -c app_front/pyproject.toml \
            --cov=app_front \
            --cov-config=app_front/pyproject.toml \
            --no-cov-on-fail \
            --cov-report=term-missing \
            --cov-report=json:app_front/coverage_front.json \
            > app_front/pytest_report_front.txt 2>& || true
          
          echo "### UI Front-end" >> $GITHUB_STEP_SUMMARY
          if grep -q 'TOTAL' app_front/pytest_report_front.txt; then
            grep 'TOTAL' app_front/pytest_report_front.txt | awk '{print "Couverture totale : " $NF}' >> $GITHUB_STEP_SUMMARY
          else
            echo "Aucun test trouvé ou erreur lors de l'exécution." >> $GITHUB_STEP_SUMMARY
          fi

      # --- TESTS API (BACK-END) ---
      - name: Install dependencies app_api
        run: uv sync --project app_api --frozen --all-extras --all-groups

      - name: Run Tests app_api
        env:
          FASTAPI_PORT: 8000
        run: |
          # Exécution et capture
          uv run --project app_api pytest tests/ \
            -c app_api/pyproject.toml \
            --cov=app_api \
            --cov-config=app_api/pyproject.toml \
            --no-cov-on-fail \
            --cov-report=term-missing \
            --cov-report=json:app_api/coverage_api.json \
            > app_api/pytest_report_api.txt 2>& || true
          
          echo "### UI Back-end" >> $GITHUB_STEP_SUMMARY
          if grep -q 'TOTAL' app_api/pytest_report_api.txt; then
            grep 'TOTAL' app_api/pytest_report_api.txt | awk '{print "Couverture totale : " $NF}' >> $GITHUB_STEP_SUMMARY
          else
            echo "Aucun test trouvé ou erreur lors de l'exécution." >> $GITHUB_STEP_SUMMARY
          fi

      # --- ARCHIVAGE ---
      - name: Archive Code Coverage Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-coverage-reports
          path: |
            app_front/pytest_report_front.txt
            app_front/htmlcov_front/
            app_api/pytest_report_api.txt
            app_api/htmlcov_api/