name: Deploy Documentation


on:
  push:
    branches: [main]


permissions:
  contents: write
  pages: write
  id-token: write


jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras 

      - name: Generate API skeleton
        run: uv run sphinx-apidoc -o docs/source app/

      # 2. GÉNÉRER LE HTML
      - name: Build Sphinx Documentation
        run: |
          mkdir -p public
          # -n : mode "nitpicky" (signale toutes les petites erreurs)
          # -v : mode verbeux (affiche ce que Sphinx fait)
          uv run sphinx-build -nv -b html docs/source public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

  deploy-docs:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4